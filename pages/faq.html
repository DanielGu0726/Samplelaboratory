<!-- FAQ Section -->
<section class="section">
  <div class="container">
    <div class="section-header reveal">
      <h2 class="section-title" data-i18n="faq.title">자주 묻는 질문</h2>
      <p class="section-subtitle" data-i18n="faq.subtitle">고객님들이 자주 문의하시는 내용을 모았습니다</p>
    </div>

    <div class="faq-list">
      <!-- FAQ Item 1 -->
      <div class="faq-item reveal">
        <button class="faq-question">
          <span data-i18n="faq.q1">제작 기간은 얼마나 걸리나요?</span>
          <span class="faq-icon">▼</span>
        </button>
        <div class="faq-answer">
          <div class="faq-answer-content" data-i18n="faq.a1">
            일반적으로 3-5일 정도 소요됩니다. 긴급한 경우 당일 제작도 가능하니 문의해주세요.
          </div>
        </div>
      </div>

      <!-- FAQ Item 2 -->
      <div class="faq-item reveal">
        <button class="faq-question">
          <span data-i18n="faq.q2">어떤 재료를 사용하나요?</span>
          <span class="faq-icon">▼</span>
        </button>
        <div class="faq-answer">
          <div class="faq-answer-content" data-i18n="faq.a2">
            지르코니아, 세라믹, 금속 등 다양한 재료를 사용하며, 모두 국제 인증을 받은 고품질 재료입니다.
          </div>
        </div>
      </div>

      <!-- FAQ Item 3 -->
      <div class="faq-item reveal">
        <button class="faq-question">
          <span data-i18n="faq.q3">품질 보증은 어떻게 되나요?</span>
          <span class="faq-icon">▼</span>
        </button>
        <div class="faq-answer">
          <div class="faq-answer-content" data-i18n="faq.a3">
            모든 제품은 엄격한 품질 검사를 거치며, 문제 발생 시 즉시 재제작해드립니다.
          </div>
        </div>
      </div>

      <!-- FAQ Item 4 -->
      <div class="faq-item reveal">
        <button class="faq-question">
          <span data-i18n="faq.q4">CAD/CAM 시스템을 사용하나요?</span>
          <span class="faq-icon">▼</span>
        </button>
        <div class="faq-answer">
          <div class="faq-answer-content" data-i18n="faq.a4">
            네, 최신 CAD/CAM 시스템과 3D 프린터를 활용하여 정밀하고 신속한 제작이 가능합니다.
          </div>
        </div>
      </div>

      <!-- FAQ Item 5 -->
      <div class="faq-item reveal">
        <button class="faq-question">
          <span data-i18n="faq.q5">방문 상담이 가능한가요?</span>
          <span class="faq-icon">▼</span>
        </button>
        <div class="faq-answer">
          <div class="faq-answer-content" data-i18n="faq.a5">
            사전 예약 후 방문하시면 상담 및 시설 견학이 가능합니다. 연락처로 문의해주세요.
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
