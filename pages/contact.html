<!-- Contact Section -->
<section class="section">
  <div class="container">
    <div class="section-header reveal">
      <h2 class="section-title" data-i18n="contact.title">연락처</h2>
      <p class="section-subtitle" data-i18n="contact.subtitle">궁금하신 사항이나 문의사항을 남겨주세요</p>
    </div>

    <div class="contact-grid">
      <!-- Contact Information -->
      <div class="contact-info">
        <h3 style="font-size: 24px; font-weight: 600; margin-bottom: 24px;" data-i18n="contact.info.title">연락 정보</h3>

        <div class="contact-item reveal">
          <div class="contact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <div class="contact-details">
            <h3 data-i18n="contact.address.title">주소</h3>
            <p data-i18n="contact.address.text">서울시 강남구 테헤란로 123</p>
          </div>
        </div>

        <div class="contact-item reveal">
          <div class="contact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </div>
          <div class="contact-details">
            <h3 data-i18n="contact.phone.title">전화</h3>
            <p data-i18n="contact.phone.text">02-1234-5678</p>
          </div>
        </div>

        <div class="contact-item reveal">
          <div class="contact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
          <div class="contact-details">
            <h3 data-i18n="contact.email.title">이메일</h3>
            <p data-i18n="contact.email.text">info@samplelab.com</p>
          </div>
        </div>

        <div class="contact-item reveal">
          <div class="contact-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="contact-details">
            <h3 data-i18n="contact.hours.title">영업시간</h3>
            <p data-i18n-html="contact.hours.text">평일: 09:00 - 18:00<br>주말: 휴무</p>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="reveal">
        <h3 style="font-size: 24px; font-weight: 600; margin-bottom: 24px;" data-i18n="contact.form.title">문의하기</h3>

        <form id="contact-form">
          <div class="form-group">
            <label class="form-label" for="name" data-i18n="contact.form.name">이름</label>
            <input type="text" id="name" name="name" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="email" data-i18n="contact.form.email">이메일</label>
            <input type="email" id="email" name="email" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label" for="phone" data-i18n="contact.form.phone">전화번호</label>
            <input type="tel" id="phone" name="phone" class="form-input">
          </div>

          <div class="form-group">
            <label class="form-label" for="message" data-i18n="contact.form.message">문의 내용</label>
            <textarea id="message" name="message" class="form-textarea" required></textarea>
          </div>

          <button type="submit" class="form-submit" data-i18n="contact.form.submit">전송</button>
        </form>
      </div>
    </div>
  </div>
</section>
