<!-- Products Section -->
<section class="section">
  <div class="container">
    <div class="section-header reveal">
      <h2 class="section-title" data-i18n="products.title">제품 소개</h2>
      <p class="section-subtitle" data-i18n="products.subtitle">다양한 치과 보철물을 최고 품질로 제작합니다</p>
    </div>

    <div class="products-grid">
      <!-- Zirconia Crown -->
      <div class="product-card reveal">
        <div class="product-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></div>
        <div class="product-content">
          <span class="product-tag" data-i18n="prod.zirconia.tag">지르코니아</span>
          <h3 class="product-title" data-i18n="prod.zirconia.title">지르코니아 크라운</h3>
          <p class="product-desc" data-i18n="prod.zirconia.desc">자연치아와 유사한 심미성과 뛰어난 강도를 자랑하는 지르코니아 크라운</p>
        </div>
      </div>

      <!-- IBS Crown -->
      <div class="product-card reveal">
        <div class="product-image" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
        <div class="product-content">
          <span class="product-tag" data-i18n="prod.ibs.tag">임플란트</span>
          <h3 class="product-title" data-i18n="prod.ibs.title">IBS 크라운</h3>
          <p class="product-desc" data-i18n="prod.ibs.desc">임플란트 식립을 위한 정밀한 IBS 크라운</p>
        </div>
      </div>

      <!-- Zirconia Bridge -->
      <div class="product-card reveal">
        <div class="product-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
        <div class="product-content">
          <span class="product-tag" data-i18n="prod.bridge.tag">브릿지</span>
          <h3 class="product-title" data-i18n="prod.bridge.title">지르코니아 브릿지</h3>
          <p class="product-desc" data-i18n="prod.bridge.desc">여러 개의 치아를 연결하는 강력하고 심미적인 브릿지</p>
        </div>
      </div>

      <!-- Ceramic Inlay -->
      <div class="product-card reveal">
        <div class="product-image" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);"></div>
        <div class="product-content">
          <span class="product-tag" data-i18n="prod.inlay.tag">인레이</span>
          <h3 class="product-title" data-i18n="prod.inlay.title">세라믹 인레이</h3>
          <p class="product-desc" data-i18n="prod.inlay.desc">부분 결손 부위를 정밀하게 수복하는 세라믹 인레이</p>
        </div>
      </div>

      <!-- Complete Denture -->
      <div class="product-card reveal">
        <div class="product-image" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);"></div>
        <div class="product-content">
          <span class="product-tag" data-i18n="prod.denture.tag">틀니</span>
          <h3 class="product-title" data-i18n="prod.denture.title">완전 틀니</h3>
          <p class="product-desc" data-i18n="prod.denture.desc">환자 맞춤형 완전 틀니 제작</p>
        </div>
      </div>

      <!-- Partial Denture -->
      <div class="product-card reveal">
        <div class="product-image" style="background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);"></div>
        <div class="product-content">
          <span class="product-tag" data-i18n="prod.partial.tag">부분틀니</span>
          <h3 class="product-title" data-i18n="prod.partial.title">부분 틀니</h3>
          <p class="product-desc" data-i18n="prod.partial.desc">일부 치아 결손 시 사용하는 부분 틀니</p>
        </div>
      </div>
    </div>
  </div>
</section>
